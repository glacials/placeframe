<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Placeframe import flow preview</title>
  <desc id="desc">A stylized screenshot showing the Placeframe import card and privacy-focused onboarding steps.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1120" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fbfb"/>
      <stop offset="1" stop-color="#deebea"/>
    </linearGradient>
    <linearGradient id="card" x1="350" y1="140" x2="870" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f8f8"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <circle cx="194" cy="126" r="126" fill="#45a9a51a"/>
  <circle cx="1116" cy="128" r="148" fill="#ff785b18"/>
  <circle cx="1040" cy="736" r="168" fill="#1f6f7814"/>

  <g opacity=".08" stroke="#10202b">
    <path d="M70 0v860"/>
    <path d="M170 0v860"/>
    <path d="M270 0v860"/>
    <path d="M370 0v860"/>
    <path d="M470 0v860"/>
    <path d="M570 0v860"/>
    <path d="M670 0v860"/>
    <path d="M770 0v860"/>
    <path d="M870 0v860"/>
    <path d="M970 0v860"/>
    <path d="M1070 0v860"/>
    <path d="M1170 0v860"/>
  </g>

  <g>
    <rect x="302" y="110" width="676" height="500" rx="34" fill="url(#card)" stroke="#ffffff" stroke-width="2"/>
    <rect x="302" y="110" width="676" height="500" rx="34" fill="none" stroke="#10202b14"/>
    <text x="354" y="176" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="26" font-weight="700">Placeframe</text>
    <text x="874" y="176" fill="#5f7178" font-family="SFMono-Regular, SF Mono, monospace" font-size="18" letter-spacing="1.5">STEP 2 OF 3</text>

    <text x="354" y="270" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="56" font-weight="700">
      Export Timeline data from Google Maps,
    </text>
    <text x="354" y="332" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="56" font-weight="700">
      then move location-history.json
    </text>
    <text x="354" y="394" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="56" font-weight="700">
      onto this Mac.
    </text>

    <rect x="354" y="448" width="220" height="62" rx="31" fill="#ffffff" stroke="#10202b18"/>
    <text x="447" y="487" text-anchor="middle" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="24" font-weight="600">Back</text>
    <rect x="592" y="448" width="264" height="62" rx="31" fill="#0e3d54"/>
    <text x="724" y="487" text-anchor="middle" fill="#ffffff" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="24" font-weight="700">Import Timeline</text>

    <rect x="354" y="548" width="548" height="32" rx="16" fill="#1f6f780f"/>
    <circle cx="382" cy="564" r="8" fill="#45a9a5"/>
    <text x="408" y="572" fill="#0e3d54" font-family="SFMono-Regular, SF Mono, monospace" font-size="18" font-weight="700">
      Matching runs locally on this Mac.
    </text>
  </g>

  <g>
    <rect x="130" y="250" width="128" height="128" rx="30" fill="#182430"/>
    <rect x="154" y="274" width="80" height="80" rx="24" fill="none" stroke="#45a9a5" stroke-width="6"/>
    <path d="M194 346c-16-17.5-24-29.7-24-39.8a24 24 0 1 1 48 0c0 10.1-8 22.3-24 39.8Z" fill="#ff785b"/>
    <circle cx="194" cy="300" r="13" fill="#f2b84c"/>
  </g>

  <g>
    <rect x="934" y="268" width="214" height="222" rx="28" fill="#ffffff" stroke="#10202b14"/>
    <text x="970" y="330" fill="#10202b" font-family="SFMono-Regular, SF Mono, monospace" font-size="18" letter-spacing="1.4">
      WHAT HAPPENS NEXT
    </text>
    <text x="970" y="382" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="26" font-weight="700">
      1. Scan Apple Photos
    </text>
    <text x="970" y="428" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="26" font-weight="700">
      2. Match likely frames
    </text>
    <text x="970" y="474" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="26" font-weight="700">
      3. Prepare review
    </text>
  </g>

  <g>
    <rect x="170" y="644" width="942" height="112" rx="32" fill="#15212d"/>
    <text x="214" y="700" fill="#f7fafb" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="32" font-weight="700">
      Clear prompts. Native controls. No account wall before the real work.
    </text>
    <text x="214" y="734" fill="#c8d4d8" font-family="Helvetica Neue, Arial, sans-serif" font-size="24">
      Built for photographers who want context back without turning their archive into a SaaS migration project.
    </text>
  </g>
</svg>
