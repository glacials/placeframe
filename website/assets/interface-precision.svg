<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Placeframe precision review preview</title>
  <desc id="desc">A stylized screenshot showing location precision choices and day-level apply controls.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="60" x2="1130" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f6fafa"/>
      <stop offset="1" stop-color="#ddebea"/>
    </linearGradient>
    <linearGradient id="panel" x1="246" y1="120" x2="1002" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f8f8"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="860" fill="url(#bg)"/>
  <circle cx="194" cy="194" r="148" fill="#45a9a516"/>
  <circle cx="1122" cy="758" r="190" fill="#ff785b14"/>

  <g>
    <rect x="188" y="90" width="904" height="680" rx="34" fill="url(#panel)" stroke="#ffffff" stroke-width="2"/>
    <rect x="188" y="90" width="904" height="680" rx="34" fill="none" stroke="#10202b14"/>

    <text x="248" y="158" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="46" font-weight="700">
      Review one day at a time
    </text>
    <text x="248" y="198" fill="#5f7178" font-family="Helvetica Neue, Arial, sans-serif" font-size="24">
      Apply all writes every reviewed photo shown for the current day. Adjust precision first if needed.
    </text>

    <rect x="798" y="120" width="180" height="56" rx="28" fill="#0e3d54"/>
    <text x="888" y="155" text-anchor="middle" fill="#ffffff" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="22" font-weight="700">
      Apply All
    </text>

    <rect x="248" y="256" width="784" height="140" rx="26" fill="#ffffff" stroke="#10202b12"/>
    <text x="286" y="308" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="24" font-weight="700">
      Save location as
    </text>
    <rect x="286" y="328" width="214" height="40" rx="20" fill="#1f6f7812"/>
    <text x="393" y="354" text-anchor="middle" fill="#0e3d54" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="18" font-weight="700">
      Specific match
    </text>
    <rect x="520" y="328" width="214" height="40" rx="20" fill="#ffffff" stroke="#10202b18"/>
    <text x="627" y="354" text-anchor="middle" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="18" font-weight="700">
      Neighborhood
    </text>
    <rect x="754" y="328" width="214" height="40" rx="20" fill="#ffffff" stroke="#10202b18"/>
    <text x="861" y="354" text-anchor="middle" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="18" font-weight="700">
      Leave blank
    </text>

    <rect x="248" y="438" width="376" height="278" rx="26" fill="#15212d"/>
    <text x="284" y="492" fill="#f7fafb" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="30" font-weight="700">
      Confidence banner
    </text>
    <rect x="284" y="524" width="166" height="36" rx="18" fill="#f2b84c22"/>
    <text x="367" y="548" text-anchor="middle" fill="#f2c975" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="17" font-weight="700">
      Compare camera time
    </text>
    <text x="284" y="604" fill="#c8d4d8" font-family="Helvetica Neue, Arial, sans-serif" font-size="22">
      When the timeline looks shifted, Placeframe
    </text>
    <text x="284" y="636" fill="#c8d4d8" font-family="Helvetica Neue, Arial, sans-serif" font-size="22">
      can preview a better time-offset assumption
    </text>
    <text x="284" y="668" fill="#c8d4d8" font-family="Helvetica Neue, Arial, sans-serif" font-size="22">
      before you write any metadata.
    </text>

    <rect x="658" y="438" width="374" height="278" rx="26" fill="#ffffff" stroke="#10202b12"/>
    <text x="694" y="492" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="30" font-weight="700">
      Photographer-first control
    </text>
    <text x="694" y="550" fill="#5f7178" font-family="Helvetica Neue, Arial, sans-serif" font-size="22">
      Suggestions stay suggestions until you approve them.
    </text>
    <text x="694" y="582" fill="#5f7178" font-family="Helvetica Neue, Arial, sans-serif" font-size="22">
      Batch apply exists, but only after the reviewed day looks right.
    </text>

    <g>
      <circle cx="730" cy="650" r="10" fill="#45a9a5"/>
      <text x="754" y="657" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="19" font-weight="700">
        Suggested locations are explicit
      </text>
      <circle cx="730" cy="688" r="10" fill="#ff785b"/>
      <text x="754" y="695" fill="#10202b" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="19" font-weight="700">
        Destructive choices stay visually distinct
      </text>
    </g>
  </g>
</svg>
